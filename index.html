<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOEIC 金フレ 単語テスト</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>
<body>
  <header class="header">
    <h1>📚 TOEIC <span class="accent">金フレ</span> 単語テスト</h1>
    <a href="history.html" class="header-link">📊 成績履歴</a>
  </header>

  <div class="container">
    <div class="card">
      <h2 class="card-title">テスト設定</h2>

      <div class="form-group">
        <label for="name">名前</label>
        <select id="name">
          <option value="Yuto">Yuto</option>
          <option value="Yushi">Yushi</option>
          <option value="Test">Test</option>
        </select>
      </div>

      <div class="form-group">
        <label for="set">セット</label>
        <select id="set">
          <option value="1">第1セット（1〜100語）</option>
          <option value="2">第2セット（101〜200語）</option>
          <option value="3">第3セット（201〜300語）</option>
          <option value="4">第4セット（301〜400語）</option>
          <option value="5">第5セット（401〜500語）</option>
          <option value="6">第6セット（501〜600語）</option>
          <option value="7">第7セット（601〜700語）</option>
          <option value="8">第8セット（701〜800語）</option>
          <option value="9">第9セット（801〜900語）</option>
          <option value="10">第10セット（901〜1000語）</option>
        </select>
      </div>

      <div class="form-group">
        <label>出題順</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="order" value="random" checked>
            <span>🔀 ランダム</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="order" value="sequential">
            <span>📋 順番通り</span>
          </label>
        </div>
      </div>

      <button class="btn btn-accent btn-full" onclick="startQuiz()">テスト開始 →</button>
      <button class="btn btn-outline btn-full" id="reviewBtn" onclick="startReview()" style="margin-top:8px;">復習モード（全履歴の間違い）</button>

      <p style="margin-top: 16px; font-size: 13px; color: var(--text-light); text-align: center;">
        💾 名前が <strong>Yuto</strong> または <strong>Yushi</strong> の場合のみ結果が自動保存されます
      </p>
    </div>
  </div>

  <script>
    // 前回選択した名前を自動復元
    const savedName = localStorage.getItem('lastPlayerName');
    if (savedName) document.getElementById('name').value = savedName;

    function startQuiz() {
      const name  = document.getElementById('name').value;
      const set   = document.getElementById('set').value;
      const order = document.querySelector('input[name="order"]:checked').value;

      localStorage.setItem('lastPlayerName', name);
      sessionStorage.setItem('quizName',  name);
      sessionStorage.setItem('quizSet',   set);
      sessionStorage.setItem('quizOrder', order);
      sessionStorage.removeItem('quizMode');
      sessionStorage.removeItem('reviewWords');

      window.location.href = 'quiz.html';
    }

    async function startReview() {
      const name = document.getElementById('name').value;
      localStorage.setItem('lastPlayerName', name);

      if (!CONFIG.GAS_URL || CONFIG.GAS_URL === 'YOUR_GAS_URL_HERE') {
        alert('GAS_URLが設定されていないため復習モードは使用できません。');
        return;
      }

      const btn = document.getElementById('reviewBtn');
      btn.textContent = '読み込み中...';
      btn.disabled = true;

      try {
        // Results と ReviewProgress を並行取得
        const [resResults, resReview] = await Promise.all([
          fetch(CONFIG.GAS_URL + '?action=get',                        { redirect: 'follow' }),
          fetch(CONFIG.GAS_URL + '?action=getReview&name=' + encodeURIComponent(name), { redirect: 'follow' })
        ]);
        const records       = await resResults.json();
        const reviewHistory = await resReview.json();

        // 対象ユーザーのレコードを時系列順に並べる
        const userRecords = records
          .filter(r => r.name === name)
          .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        if (userRecords.length === 0) {
          alert(`${name} の記録がまだありません。`);
          return;
        }

        // 単語ごとの間違い回数 と 初出のセット番号 を集計
        const wrongCount = {};  // { english: count }
        const wordSetMap = {};  // { english: setNumber }
        userRecords.forEach(r => {
          if (!r.wrongWords) return;
          r.wrongWords.split(' / ').forEach(w => {
            const eng = w.split('(')[0].trim();
            if (!eng) return;
            wrongCount[eng] = (wrongCount[eng] || 0) + 1;
            if (!wordSetMap[eng]) wordSetMap[eng] = r.setNumber;
          });
        });

        if (Object.keys(wrongCount).length === 0) {
          alert(`${name} の間違えた単語がありません。`);
          return;
        }

        const masteredWords = new Set();

        // 卒業判定①: そのセットの直近2回どちらにも出てこなかった単語は除外
        const recordsBySet = {};
        userRecords.forEach(r => {
          if (!recordsBySet[r.setNumber]) recordsBySet[r.setNumber] = [];
          recordsBySet[r.setNumber].push(r);
        });
        Object.entries(wordSetMap).forEach(([eng, setNum]) => {
          const setRecords = recordsBySet[setNum] || [];
          if (setRecords.length < 2) return;
          const last2 = setRecords.slice(-2);
          const stillWrong = last2.some(r =>
            r.wrongWords && r.wrongWords.split(' / ').some(w => w.split('(')[0].trim() === eng)
          );
          if (!stillWrong) masteredWords.add(eng);
        });

        // 卒業判定②: 復習モードで直近2回連続正解した単語は除外
        const reviewByWord = {};  // { english: [isCorrect, ...] } 時系列順
        reviewHistory
          .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
          .forEach(r => {
            if (!reviewByWord[r.english]) reviewByWord[r.english] = [];
            reviewByWord[r.english].push(r.isCorrect);
          });
        Object.entries(reviewByWord).forEach(([eng, results]) => {
          if (results.length < 2) return;
          const last2 = results.slice(-2);
          if (last2[0] === true && last2[1] === true) masteredWords.add(eng);
        });

        const reviewWords = Object.keys(wrongCount).filter(w => !masteredWords.has(w));

        if (reviewWords.length === 0) {
          alert(`${name} の復習すべき単語がありません。全部覚えています！`);
          return;
        }

        sessionStorage.setItem('quizName',          name);
        sessionStorage.setItem('quizMode',          'review');
        sessionStorage.setItem('reviewWords',       JSON.stringify(reviewWords));
        sessionStorage.setItem('reviewWrongCounts', JSON.stringify(wrongCount));

        window.location.href = 'quiz.html';
      } catch (err) {
        alert('データの読み込みに失敗しました。');
      } finally {
        btn.textContent = '復習モード（全履歴の間違い）';
        btn.disabled = false;
      }
    }

  </script>
</body>
</html>
