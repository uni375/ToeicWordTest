<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト中 - 金フレ単語テスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>📚 TOEIC <span class="accent">金フレ</span> 単語テスト</h1>
    <span id="headerInfo" style="font-size:13px; color:rgba(255,255,255,0.7);"></span>
  </header>

  <div class="container">
    <div class="card" id="quizCard">
      <!-- Progress -->
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>

      <div class="question-meta">
        <span id="questionNum">問題 1 / 100</span>
        <span class="set-badge" id="setBadge"></span>
      </div>

      <!-- 復習モード: 間違い回数バッジ -->
      <div id="wrongCountBadge" style="display:none; margin-bottom:8px; font-size:12px; color:var(--wrong); font-weight:600;"></div>

      <!-- Question -->
      <div class="japanese-prompt">
        <span class="word-jp" id="wordJp">読み込み中...</span>
        <span class="word-example" id="wordExample" style="display:none;"></span>
      </div>

      <!-- Answer input (日→英モード) -->
      <div class="form-group" id="inputArea">
        <label for="answer">英単語を入力</label>
        <div class="answer-row">
          <input type="text" id="answer"
            placeholder="英語を入力..."
            autocomplete="off" autocorrect="off"
            autocapitalize="off" spellcheck="false" />
          <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">回答</button>
        </div>
      </div>

      <!-- 4択 (英→日モード) -->
      <div id="choicesArea" style="display:none;">
        <div id="choicesList" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>

      <!-- Feedback -->
      <div class="feedback-box" id="feedback"></div>

      <!-- Next button -->
      <div class="next-area" id="nextArea">
        <button class="btn btn-accent" id="nextBtn" onclick="nextQuestion()">次へ →</button>
      </div>
    </div>

    <!-- Error card (hidden) -->
    <div class="card" id="errorCard" style="display:none; text-align:center;">
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p id="errorMsg">words.csvの読み込みに失敗しました。</p>
        <br>
        <p style="font-size:13px; color:var(--text-light);">
          ローカルで開く場合は VS Code の Live Server などを使ってください。<br>
          GitHub Pages 上では正常に動作します。
        </p>
        <br>
        <a href="index.html" class="btn btn-outline">← 戻る</a>
      </div>
    </div>
  </div>

  <script>
    const name      = sessionStorage.getItem('quizName');
    const set       = parseInt(sessionStorage.getItem('quizSet'));
    const order     = sessionStorage.getItem('quizOrder');
    const mode      = sessionStorage.getItem('quizMode'); // 'review' or null
    const direction = sessionStorage.getItem('quizDirection') || 'jp-to-en'; // 'jp-to-en' or 'en-to-jp'
    const wrongCounts = JSON.parse(sessionStorage.getItem('reviewWrongCounts') || '{}');

    if (!name || (!set && mode !== 'review')) {
      window.location.href = 'index.html';
    }

    if (mode === 'review') {
      document.getElementById('headerInfo').textContent = `${name} ／ 復習モード`;
      document.getElementById('setBadge').textContent = '復習';
    } else {
      document.getElementById('headerInfo').textContent = `${name} ／ 第${set}セット`;
      document.getElementById('setBadge').textContent = `第${set}セット`;
    }

    let words = [];
    let allWords = []; // 4択の選択肢生成用
    let currentIndex = 0;
    let answers = [];

    // Enter キーで回答 or 次へ（日→英モードのみ）
    document.getElementById('answer').addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      if (document.getElementById('nextArea').style.display === 'none' ||
          document.getElementById('nextArea').style.display === '') {
        submitAnswer();
      } else {
        nextQuestion();
      }
    });

    async function loadWords() {
      try {
        const res  = await fetch('words.csv');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const lines = text.trim().split(/\r?\n/);

        // クォート対応CSVパーサー
        function parseCSVLine(line) {
          const fields = [];
          let cur = '', inQ = false;
          for (let i = 0; i < line.length; i++) {
            if (line[i] === '"') {
              if (inQ && line[i+1] === '"') { cur += '"'; i++; }
              else inQ = !inQ;
            } else if (line[i] === ',' && !inQ) {
              fields.push(cur.trim()); cur = '';
            } else { cur += line[i]; }
          }
          fields.push(cur.trim());
          return fields;
        }

        const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase());
        const iId = headers.indexOf('id');
        const iEn = headers.indexOf('english');
        const iJp = headers.indexOf('japanese');
        const iEx = headers.indexOf('example');

        allWords = lines.slice(1)
          .map(line => {
            const f = parseCSVLine(line);
            return {
              id:       parseInt(f[iId]),
              english:  f[iEn] || '',
              japanese: f[iJp] || '',
              example:  iEx >= 0 ? (f[iEx] || '') : ''
            };
          })
          .filter(w => !isNaN(w.id) && w.english);

        let setWords;
        if (mode === 'review') {
          const reviewWords = JSON.parse(sessionStorage.getItem('reviewWords') || '[]');
          setWords = allWords.filter(w => reviewWords.includes(w.english));
          if (setWords.length === 0) {
            showError('復習する単語がwords.csvに見つかりませんでした。');
            return;
          }
          // 復習モードは常にランダム
          for (let i = setWords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [setWords[i], setWords[j]] = [setWords[j], setWords[i]];
          }
        } else {
          const start = (set - 1) * 100 + 1;
          const end   = set * 100;
          setWords = allWords.filter(w => w.id >= start && w.id <= end);
          if (setWords.length === 0) {
            showError(`第${set}セットの単語がwords.csvに見つかりません（ID ${start}〜${end}）。`);
            return;
          }
          if (order === 'random') {
            // Fisher-Yates shuffle
            for (let i = setWords.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [setWords[i], setWords[j]] = [setWords[j], setWords[i]];
            }
          }
        }

        words = setWords;
        showQuestion();
      } catch (err) {
        showError('words.csvの読み込みに失敗しました。\n' + err.message);
      }
    }

    function showError(msg) {
      document.getElementById('quizCard').style.display = 'none';
      document.getElementById('errorCard').style.display = 'block';
      document.getElementById('errorMsg').textContent = msg;
    }

    function showQuestion() {
      const word     = words[currentIndex];
      const progress = (currentIndex / words.length) * 100;

      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('questionNum').textContent =
        `問題 ${currentIndex + 1} / ${words.length}`;

      // 復習モード: 間違い回数を表示
      const wrongCountEl = document.getElementById('wrongCountBadge');
      if (mode === 'review' && wrongCountEl) {
        const count = wrongCounts[word.english] || 0;
        wrongCountEl.textContent = `これまで ${count} 回間違えた単語`;
        wrongCountEl.style.display = 'block';
      } else if (wrongCountEl) {
        wrongCountEl.style.display = 'none';
      }

      // フィードバック・次へボタンをリセット
      document.getElementById('feedback').className = 'feedback-box';
      document.getElementById('feedback').innerHTML = '';
      document.getElementById('nextArea').style.display = 'none';
      document.getElementById('nextBtn').textContent =
        currentIndex === words.length - 1 ? '結果を見る 📊' : '次へ →';

      const exampleEl = document.getElementById('wordExample');

      if (direction === 'en-to-jp') {
        // 英→日モード: 英単語を大きく表示、例文なし、4択
        document.getElementById('wordJp').textContent = word.english;
        document.getElementById('wordJp').style.fontSize = '';
        document.getElementById('wordJp').style.color = '';
        exampleEl.style.display = 'none';

        document.getElementById('inputArea').style.display   = 'none';
        document.getElementById('choicesArea').style.display = 'block';
        showChoices(word);
      } else {
        // 日→英モード: 日本語・例文を表示、入力フォーム
        if (word.example) {
          document.getElementById('wordJp').textContent = word.japanese;
          document.getElementById('wordJp').style.fontSize = '18px';
          document.getElementById('wordJp').style.color = 'var(--text-light)';
          exampleEl.textContent = word.example;
          exampleEl.style.display = 'block';
        } else {
          document.getElementById('wordJp').textContent = word.japanese;
          document.getElementById('wordJp').style.fontSize = '';
          document.getElementById('wordJp').style.color = '';
          exampleEl.style.display = 'none';
        }

        document.getElementById('inputArea').style.display   = 'block';
        document.getElementById('choicesArea').style.display = 'none';

        const answerInput = document.getElementById('answer');
        answerInput.value    = '';
        answerInput.disabled = false;
        answerInput.style.borderColor = '';
        document.getElementById('submitBtn').style.display = 'inline-block';
        answerInput.focus();
      }
    }

    function showChoices(word) {
      // 正解以外からランダムに3つ選ぶ
      const others = allWords.filter(w => w.english !== word.english);
      const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
      const choices = [...shuffled, word].sort(() => Math.random() - 0.5);

      const list = document.getElementById('choicesList');
      list.innerHTML = '';
      choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline';
        btn.textContent = choice.japanese;
        btn.style.textAlign = 'left';
        btn.onclick = () => selectChoice(choice, word, btn, choices);
        list.appendChild(btn);
      });
    }

    function selectChoice(selected, correct, clickedBtn, choices) {
      // 全ボタンを無効化
      document.querySelectorAll('#choicesList button').forEach(b => b.disabled = true);

      const isCorrect = selected.english === correct.english;
      const fb = document.getElementById('feedback');

      if (isCorrect) {
        clickedBtn.style.background = 'var(--correct)';
        clickedBtn.style.color = '#fff';
        clickedBtn.style.borderColor = 'var(--correct)';
        fb.innerHTML  = `✓ 正解！`;
        fb.className  = 'feedback-box correct';
      } else {
        clickedBtn.style.background = 'var(--wrong)';
        clickedBtn.style.color = '#fff';
        clickedBtn.style.borderColor = 'var(--wrong)';
        // 正解ボタンを緑に
        document.querySelectorAll('#choicesList button').forEach(b => {
          if (b.textContent === correct.japanese) {
            b.style.background = 'var(--correct)';
            b.style.color = '#fff';
            b.style.borderColor = 'var(--correct)';
          }
        });
        fb.innerHTML  = `✗ 不正解。正解: <strong>${correct.japanese}</strong>`;
        fb.className  = 'feedback-box wrong';
      }

      answers.push({ word: correct, userAnswer: selected.japanese, isCorrect });
      document.getElementById('nextArea').style.display = 'block';
    }

    function submitAnswer() {
      const input   = document.getElementById('answer').value.trim().toLowerCase();
      const correct = words[currentIndex].english.toLowerCase();
      const isCorrect = input === correct;

      answers.push({
        word:      words[currentIndex],
        userAnswer: document.getElementById('answer').value.trim(),
        isCorrect
      });

      const fb = document.getElementById('feedback');
      if (isCorrect) {
        fb.innerHTML  = `✓ 正解！ <strong>${words[currentIndex].english}</strong>`;
        fb.className  = 'feedback-box correct';
      } else {
        const displayed = input || '（未回答）';
        fb.innerHTML  = `✗ 不正解。 <span style="text-decoration:line-through;">${displayed}</span>
                         → 正解: <strong>${words[currentIndex].english}</strong>`;
        fb.className  = 'feedback-box wrong';
      }

      document.getElementById('answer').disabled = true;
      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('nextArea').style.display  = 'block';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= words.length) {
        sessionStorage.setItem('quizAnswers', JSON.stringify(answers));
        window.location.href = 'result.html';
      } else {
        showQuestion();
      }
    }

    loadWords();
  </script>
</body>
</html>
